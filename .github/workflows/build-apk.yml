name: Gerar APK Android

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-22.04
    timeout-minutes: 150

    steps:
      - name: Baixar código
        uses: actions/checkout@v4

      - name: Conferir estrutura
        run: |
          pwd
          ls -la
          test -f buildozer.spec
          test -f main.py
          grep -n "android.minapi" buildozer.spec
          grep -n "android.ndk_api" buildozer.spec

      - name: Instalar dependências do sistema
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git zip unzip openjdk-17-jdk python3-pip autoconf libtool \
            pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev \
            libtinfo5 cmake libffi-dev libssl-dev build-essential \
            ccache gettext

      - name: Preparar Python e Buildozer
        run: |
          python3 -m pip install --upgrade pip setuptools wheel
          python3 -m pip install buildozer==1.5.0 cython==0.29.36 virtualenv
          python3 -m pip install "python-for-android==2024.01.21"
          buildozer --version
          python3 -m pythonforandroid.toolchain --version || true

      - name: Limpar cache antigo do Android/Buildozer
        run: |
          rm -rf .buildozer
          rm -rf ~/.buildozer/android/platform/build-*
          rm -rf ~/.gradle/caches/modules-2/files-2.1/org.jetbrains.kotlin || true

      - name: Criar APK Debug
        run: |
          set -o pipefail
          buildozer android debug 2>&1 | tee buildozer_full.log

      - name: Listar APK gerado
        if: always()
        run: |
          echo "Arquivos APK encontrados:"
          find . -name "*.apk" -type f || true
          echo "Últimas linhas do log:"
          tail -n 160 buildozer_full.log || true

      - name: Enviar APK como artefato
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: express-consumo-oc-v1-4-premium-debug-apk
          path: bin/*.apk

      - name: Enviar log se falhar
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: buildozer-full-log-v1-4
          path: buildozer_full.log
